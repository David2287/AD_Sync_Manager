version: "3.9"

services:
  ad-sync-manager:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: ad-sync-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database and markdown notes outside the container.
      - ad-data:/data
    env_file:
      - ../.env
    environment:
      DATABASE_DSN: "file:/data/adsync.db?cache=shared&mode=rwc"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ad-data:
    driver: local
